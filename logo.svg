<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="50%" style="stop-color:#5D3A1A"/>
      <stop offset="100%" style="stop-color:#3D2510"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#CCCCCC"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="#1a1a1a" rx="15"/>
  
  <!-- Bear Claw - stylized -->
  <g transform="translate(200,100)" fill="url(#clawGrad)">
    <!-- Main pad -->
    <ellipse cx="0" cy="25" rx="45" ry="35" transform="rotate(-10)"/>
    <!-- Toe 1 -->
    <path d="M-35,-20 Q-50,-60 -40,-80 Q-30,-60 -25,-25 Z" transform="rotate(-20)"/>
    <!-- Toe 2 -->
    <path d="M-10,-25 Q-15,-65 -5,-85 Q5,-65 0,-25 Z" transform="rotate(-5)"/>
    <!-- Toe 3 -->
    <path d="M15,-25 Q20,-65 30,-85 Q40,-65 35,-25 Z" transform="rotate(10)"/>
    <!-- Toe 4 -->
    <path d="M35,-20 Q50,-55 60,-75 Q70,-55 60,-20 Z" transform="rotate(25)"/>
  </g>
  
  <!-- BPS Text -->
  <text x="200" y="170" font-family="Arial Black, Impact, sans-serif" font-size="55" font-weight="bold" fill="url(#textGrad)" text-anchor="middle" letter-spacing="8">BPS</text>
</svg>
